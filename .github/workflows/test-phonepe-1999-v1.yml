name: Test PhonePe 1999 Integration

on:
  push:
    branches: [agent/phonepe-upi-1999-v1]
    paths:
      - "subscription/routes.py"
      - ".github/workflows/test-phonepe-1999-v1.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'agent/phonepe-upi-1999-v1' }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m py_compile subscription/routes.py database.py auth/routes.py
      - name: Validate exact amount, schema and idempotency
        env:
          DB_PATH: /tmp/okai-phonepe-test.db
        run: |
          rm -f /tmp/okai-phonepe-test.db
          python - <<'PY'
          from database import init_db, get_db
          from auth.utils import hash_password
          from subscription.routes import PLAN, PLAN_ID, _activate_subscription, _ensure_subscription_schema

          assert PLAN["price"] == 199900
          assert PLAN["amount_rupees"] == 1999
          assert PLAN["duration_days"] == 30
          init_db(); _ensure_subscription_schema()
          conn = get_db()
          conn.execute("INSERT INTO users(name,email,password_hash,phone,subscription_status) VALUES (?,?,?,?,?)", ("Test User","paytest@example.com",hash_password("secret1"),"+919999999999","expired"))
          uid = conn.execute("SELECT id FROM users WHERE email='paytest@example.com'").fetchone()["id"]
          conn.execute("INSERT INTO subscriptions(user_id,plan,amount,status,payment_gateway,merchant_order_id,gateway_state) VALUES (?,?,?,'pending','phonepe',?,'PENDING')", (uid,PLAN_ID,1999.0,"OKAI_1_1234567890_ABCDEF1234"))
          conn.commit()
          sub = conn.execute("SELECT * FROM subscriptions WHERE user_id=?", (uid,)).fetchone()
          payload = {"state":"COMPLETED","amount":199900,"paymentDetails":[{"state":"COMPLETED","transactionId":"PHONEPE_TXN_TEST","paymentMode":"UPI_INTENT"}]}
          first = _activate_subscription(conn, sub, payload)
          assert first["activated"] is True
          fresh = conn.execute("SELECT * FROM subscriptions WHERE id=?", (sub["id"],)).fetchone()
          second = _activate_subscription(conn, fresh, payload)
          assert second["activated"] is False
          assert second["valid_till"] == first["valid_till"]
          assert conn.execute("SELECT subscription_status FROM users WHERE id=?", (uid,)).fetchone()["subscription_status"] == "active"
          cols = {r[1] for r in conn.execute("PRAGMA table_info(subscriptions)")}
          assert {"payment_gateway","merchant_order_id","gateway_order_id","gateway_transaction_id","gateway_state","gateway_payload","checkout_url","activated_at","updated_at"} <= cols
          conn.close()
          print("PhonePe backend validation OK")
          PY
