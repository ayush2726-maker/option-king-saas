name: Shared Railway AI Check

on:
  push:
    branches: [main]
    paths:
      - "bot/shared_ai.py"
      - "bot/ai_routes.py"
      - "main.py"
      - "scripts/test_shared_ai.py"
      - ".github/workflows/shared-ai-check.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile shared AI files
        run: |
          python -m py_compile bot/shared_ai.py bot/ai_routes.py main.py

      - name: Run shared AI smoke tests
        run: python scripts/test_shared_ai.py
