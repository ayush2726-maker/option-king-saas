name: Validate AUTO Index History V3

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile changed backend
        run: |
          python -m py_compile \
            main.py \
            backtest/angel_historical_index_patch.py \
            backtest/live_frequency_portfolio_patch.py \
            backtest/routes.py \
            bot/angel_fetcher.py \
            bot/strategy.py

      - name: Validate historical tokens and empty-success handling
        run: |
          python - <<'PY'
          from backtest import routes
          from backtest import live_frequency_portfolio_patch as live_patch
          from backtest.angel_historical_index_patch import (
              apply_angel_historical_index_patch,
              _historical_rows_with_index_tokens,
          )
          from bot import angel_fetcher
          from bot.strategy import calculate_tqu_score, VOLUME_NEUTRAL_BONUS

          live_patch.ANGEL_HISTORY_MIN_GAP_SECONDS = 0
          live_patch.ANGEL_HISTORY_RETRY_DELAYS = (0.0,)
          routes._OKAI_BACKTEST_CANDLE_CACHE.clear()
          apply_angel_historical_index_patch()

          assert angel_fetcher.INDEX_TOKENS["NIFTY"] == "26000"
          assert angel_fetcher.INDEX_TOKENS["BANKNIFTY"] == "26009"
          assert routes.INDEX_TOKENS["NIFTY"] == "99926000"
          assert routes.INDEX_TOKENS["BANKNIFTY"] == "99926009"
          assert routes.INDEX_TOKENS["SENSEX"] == "99919000"

          class FakeAngel:
              def __init__(self):
                  self.tokens = []
              def getCandleData(self, params):
                  self.tokens.append(params["symboltoken"])
                  if params["symboltoken"] == "99926000":
                      return {
                          "status": True,
                          "message": "SUCCESS",
                          "data": [[
                              "2026-07-20T09:15:00+05:30",
                              25000, 25010, 24990, 25005, 0,
                          ]],
                      }
                  return {"status": True, "message": "SUCCESS", "data": []}

          fake = FakeAngel()
          frame = routes.fetch_backtest_candles(
              "angelone", fake, "NIFTY", "2026-07-20"
          )
          assert len(frame) == 1
          assert fake.tokens[0] == "99926000", fake.tokens

          class EmptyAngel:
              def getCandleData(self, params):
                  return {"status": True, "message": "SUCCESS", "data": []}

          try:
              _historical_rows_with_index_tokens(
                  EmptyAngel(),
                  {
                      "exchange": "NSE",
                      "symboltoken": "99926009",
                      "interval": "ONE_MINUTE",
                      "fromdate": "2026-07-20 09:15",
                      "todate": "2026-07-20 15:30",
                  },
              )
              raise AssertionError("empty historical response must fail")
          except RuntimeError as exc:
              text = str(exc)
              assert "EMPTY_DATA" in text, text
              assert "token=26009" in text or "token=99926009" in text, text

          score = calculate_tqu_score(
              base_score=70,
              adx=30,
              volume_ratio=1.0,
              mtf_confirmed=True,
              is_sideways=False,
              volume_available=False,
          )
          assert score["volume_bonus"] == VOLUME_NEUTRAL_BONUS
          assert "VOLUME_UNAVAILABLE_NEUTRAL" in score["warnings"]
          print("AUTO historical index token validation OK")
          PY
