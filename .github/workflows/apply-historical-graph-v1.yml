name: Validate Historical Graph Backend V1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/historical-graph-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Apply historical chart patch when needed
        run: |
          if grep -q '_fetch_angel_historical_candles' bot/routes.py; then
            echo 'Historical backend patch already applied'
          else
            python scripts/patch_historical_chart_v1.py
          fi

      - name: Compile and validate history helpers
        env:
          DB_PATH: /tmp/okai-historical-graph-test.db
        run: |
          python -m py_compile bot/routes.py bot/angel_fetcher.py database.py
          rm -f /tmp/okai-historical-graph-test.db
          python - <<'PY'
          from database import init_db, get_db
          from bot.routes import (
              _chart_range_days,
              _historical_indicator_candles,
              ensure_tables,
              log_signal_snapshot,
          )

          assert _chart_range_days(1) == 1
          assert _chart_range_days(7) == 7
          assert _chart_range_days(30) == 30
          assert _chart_range_days(99) == 1

          rows = [
              ["2026-07-20T09:15:00+05:30", 100, 102, 99, 101, 1000],
              ["2026-07-20T09:30:00+05:30", 101, 103, 100, 102, 1200],
              ["2026-07-20T09:45:00+05:30", 102, 104, 101, 103, 1400],
          ]
          candles = _historical_indicator_candles(rows)
          assert len(candles) == 3
          assert candles[-1]["close"] == 103.0
          assert candles[-1]["ema9"] is not None
          assert candles[-1]["ema21"] is not None
          assert candles[-1]["vwap"] is not None

          init_db()
          conn = get_db()
          ensure_tables(conn)
          columns = {row[1] for row in conn.execute("PRAGMA table_info(signal_history)")}
          assert "instrument" in columns
          conn.close()

          conn = get_db()
          log_signal_snapshot(conn, 1, {
              "updated_at": "2026-07-20T10:00:00+05:30",
              "underlying": "BANKNIFTY",
              "price": 58000,
              "score": 84,
              "signal": "CE",
              "adx": 28,
              "volume_ratio": 1.4,
          })
          row = conn.execute(
              "SELECT instrument, price, score FROM signal_history WHERE user_id=1"
          ).fetchone()
          conn.close()
          assert row["instrument"] == "BANKNIFTY"
          assert row["price"] == 58000
          assert row["score"] == 84
          print("Historical graph backend validation OK")
          PY

      - name: Commit production backend patch
        run: |
          rm -f scripts/patch_historical_chart_v1.py
          rm -f .github/workflows/apply-historical-graph-v1.yml
          git config user.name "okai-history-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add historical chart ranges and 35-day signal history"
          git push origin HEAD:agent/historical-graph-v1
