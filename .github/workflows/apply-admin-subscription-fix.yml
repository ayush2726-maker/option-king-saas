name: Apply Admin Subscription Fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-admin-subscription-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply patch
        run: python scripts/patch_admin_subscription_status.py

      - name: Validate backend
        env:
          DB_PATH: /tmp/okai-admin-subscription-test.db
        run: |
          python -m py_compile main.py auth/routes.py subscription/routes.py
          rm -f /tmp/okai-admin-subscription-test.db
          python - <<'PY'
          from database import init_db, get_db
          from auth.utils import hash_password, create_access_token
          from subscription.routes import get_subscription_status

          init_db()
          conn = get_db()
          conn.execute(
              """
              INSERT INTO users(name,email,password_hash,is_admin,subscription_status,trial_ends_at)
              VALUES (?,?,?,?,?,?)
              """,
              ("Admin", "admin-test@example.com", hash_password("secret1"), 1, "trial", "2126-01-01T00:00:00"),
          )
          conn.commit()
          user_id = conn.execute("SELECT id FROM users WHERE email=?", ("admin-test@example.com",)).fetchone()["id"]
          conn.close()

          token = create_access_token(user_id, "admin-test@example.com")
          result = get_subscription_status("Bearer " + token)
          assert result["subscription_status"] == "active"
          assert result["unlimited"] is True
          assert result["days_remaining"] is None

          conn = get_db()
          row = conn.execute("SELECT subscription_status, trial_ends_at FROM users WHERE id=?", (user_id,)).fetchone()
          conn.close()
          assert row["subscription_status"] == "active"
          assert row["trial_ends_at"] is None
          print("Admin subscription fix validation OK")
          PY

      - name: Commit fix
        run: |
          rm -f scripts/patch_admin_subscription_status.py
          rm -f .github/workflows/apply-admin-subscription-fix.yml
          git config user.name "okai-subscription-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix admin unlimited subscription status"
          git push origin HEAD:main
