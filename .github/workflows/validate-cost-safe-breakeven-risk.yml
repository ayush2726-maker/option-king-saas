name: Validate Cost-Safe Break-Even and Risk Cap

on:
  pull_request:
    branches: [main]
    paths:
      - "backtest/cost_safe_breakeven_risk_patch.py"
      - "backtest/all_in_risk_cap_patch.py"
      - "backtest/cost_idempotence_patch.py"
      - "tests/test_cost_safe_breakeven_risk.py"
      - ".github/workflows/validate-cost-safe-breakeven-risk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile patched modules
        run: |
          python -m py_compile \
            backtest/cost_safe_breakeven_risk_patch.py \
            backtest/all_in_risk_cap_patch.py \
            backtest/cost_idempotence_patch.py

      - name: Run true break-even and all-in risk tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q tests/test_cost_safe_breakeven_risk.py
