name: Validate Static Gateway Protected LIMIT Orders

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/static-ip-limit-order-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r local_gateway_agent/requirements.txt

      - name: Apply protected LIMIT patch
        run: python scripts/patch_static_gateway_limit_orders.py

      - name: Compile gateway agent
        run: python -m py_compile local_gateway_agent/okai_local_gateway.py

      - name: Validate LIMIT price and broker payload
        env:
          HOME: /tmp/okai-limit-test-home
        run: |
          rm -rf /tmp/okai-limit-test-home && mkdir -p /tmp/okai-limit-test-home
          python - <<'PY'
          import time
          from local_gateway_agent.okai_local_gateway import AngelSession

          class FakeSmart:
              def __init__(self):
                  self.calls = []
              def placeOrder(self, params):
                  self.calls.append(dict(params))
                  return "ORDER123"

          fake = FakeSmart()
          session = AngelSession({"angel": {}})
          session.obj = fake
          session.login_at = time.time()

          buy = session.place_protected_limit(
              "NFO", "NIFTYTESTCE", "123", "BUY", 65, 100.0, 3.0
          )
          assert buy["order_id"] == "ORDER123"
          assert buy["limit_price"] == 103.0
          assert fake.calls[-1]["ordertype"] == "LIMIT"
          assert fake.calls[-1]["price"] == "103.00"
          assert fake.calls[-1]["transactiontype"] == "BUY"

          sell = session.place_protected_limit(
              "NFO", "NIFTYTESTCE", "123", "SELL", 65, 100.0, 5.0
          )
          assert sell["limit_price"] == 95.0
          assert fake.calls[-1]["ordertype"] == "LIMIT"
          assert fake.calls[-1]["price"] == "95.00"
          assert fake.calls[-1]["transactiontype"] == "SELL"

          assert AngelSession.protected_limit_price(100.01, "BUY", 3.0) >= 103.01
          assert AngelSession.protected_limit_price(100.01, "SELL", 5.0) <= 95.01
          print("Protected LIMIT order payload validation OK")
          PY

      - name: Ensure MARKET order execution is absent
        run: |
          ! grep -q '"ordertype": "MARKET"' local_gateway_agent/okai_local_gateway.py
          ! grep -q '\.place_market(' local_gateway_agent/okai_local_gateway.py
          grep -q '"ordertype": "LIMIT"' local_gateway_agent/okai_local_gateway.py
          grep -q 'place_protected_limit' local_gateway_agent/okai_local_gateway.py

      - name: Commit protected LIMIT gateway
        run: |
          rm -f scripts/patch_static_gateway_limit_orders.py
          rm -f .github/workflows/apply-static-gateway-limit-orders.yml
          git config user.name "okai-static-ip-gateway-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Use protected LIMIT orders in static IP gateway"
          git push origin HEAD:agent/static-ip-limit-order-v1
