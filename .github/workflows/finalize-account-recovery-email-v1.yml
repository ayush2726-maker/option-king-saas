def request_email_verification(body: RequestEmailVerificationRequest, request: Request):
    ensure_recovery_schema()
    email = _normalise_email(body.email)
    service_available = _smtp_configured()

    conn = get_db()
    try:
        identifier_hash, ip_hash = _enforce_rate_limit(
            conn,
            "request_email_verification",
            email,
            request,
        )
        existing = conn.execute(
            "SELECT id FROM users WHERE email=? LIMIT 1",
            (email,),
        ).fetchone()
        if existing:
            raise HTTPException(status_code=409, detail="Email already registered")
        if not service_available:
            raise HTTPException(status_code=503, detail="Email OTP service is not configured yet")

        now = _utcnow()
        expires_at = now + timedelta(minutes=RESET_EXPIRY_MINUTES)
        otp = f"{secrets.randbelow(1000000):06d}"
        nonce = secrets.token_hex(16)
        code_hash = _email_code_hash(email, nonce, otp)

        conn.execute(
            "UPDATE email_verification_codes SET used_at=? WHERE email=? AND used_at IS NULL",
            (now.isoformat(), email),
        )
        cursor = conn.execute(
            """
            INSERT INTO email_verification_codes(
                email, code_hash, nonce, expires_at, attempts, max_attempts,
                used_at, verified_at, verification_token_hash, token_expires_at,
                consumed_at, delivery_status, requested_at, request_ip_hash,
                consumed_ip_hash, user_agent
            ) VALUES (?, ?, ?, ?, 0, ?, NULL, NULL, NULL, NULL, NULL, 'pending', ?, ?, NULL, ?)
            """,
            (
                email,
                code_hash,
                nonce,
                expires_at.isoformat(),
                RESET_MAX_ATTEMPTS,
                now.isoformat(),
                ip_hash,
                str(request.headers.get("user-agent", ""))[:500],
            ),
        )
        verification_id = cursor.lastrowid
        conn.commit()

        try:
            _send_verification_email(email, otp, RESET_EXPIRY_MINUTES)
            conn.execute(
                "UPDATE email_verification_codes SET delivery_status='sent' WHERE id=?",
                (verification_id,),
            )
            _mark_latest_event_success(conn, "request_email_verification", identifier_hash, ip_hash)
            conn.commit()
        except Exception as exc:
            conn.execute(
                "UPDATE email_verification_codes SET delivery_status='failed', used_at=? WHERE id=?",
                (_utcnow().isoformat(), verification_id),
            )
            conn.commit()
            print(f"EMAIL VERIFICATION FAILED | {str(exc)[:180]}")
            raise HTTPException(status_code=503, detail="Could not send email OTP. Please try again.")

        return {
            "success": True,
            "message": "A 6-digit verification OTP has been sent to your email.",
            "otp_expiry_minutes": RESET_EXPIRY_MINUTES,
        }
    finally:
        conn.close()


@router.post("/verify-email-verification")
def verify_email_verification(body: VerifyEmailVerificationRequest, request: Request):
    ensure_recovery_schema()
    email = _normalise_email(body.email)
    otp = re.sub(r"\\D", "", str(body.otp or ""))
    if len(otp) != 6:
        raise HTTPException(status_code=400, detail="Enter the 6-digit OTP")

    conn = get_db()
    try:
        identifier_hash, ip_hash = _enforce_rate_limit(
            conn,
            "verify_email_verification",
            email,
            request,
        )
        row = conn.execute(
            """
            SELECT * FROM email_verification_codes
            WHERE email=? AND used_at IS NULL
            ORDER BY id DESC LIMIT 1
            """,
            (email,),
        ).fetchone()
        now = _utcnow()
        if not row or datetime.fromisoformat(row["expires_at"]) < now:
            raise HTTPException(status_code=400, detail="OTP expired. Request a new OTP.")
        if int(row["attempts"] or 0) >= int(row["max_attempts"] or RESET_MAX_ATTEMPTS):
            conn.execute(
                "UPDATE email_verification_codes SET used_at=? WHERE id=?",
                (now.isoformat(), row["id"]),
            )
            conn.commit()
            raise HTTPException(status_code=400, detail="Too many incorrect attempts. Request a new OTP.")

        supplied_hash = _email_code_hash(email, row["nonce"], otp)
        if not hmac.compare_digest(supplied_hash, row["code_hash"]):
            attempts = int(row["attempts"] or 0) + 1
            conn.execute(
                "UPDATE email_verification_codes SET attempts=? WHERE id=?",
                (attempts, row["id"]),
            )
            conn.commit()
            remaining = max(0, int(row["max_attempts"] or RESET_MAX_ATTEMPTS) - attempts)
            raise HTTPException(status_code=400, detail=f"Incorrect OTP. {remaining} attempt(s) remaining.")

        token = secrets.token_urlsafe(32)
        token_hash = _email_token_hash(email, token)
        token_expires_at = now + timedelta(minutes=30)
        conn.execute(
            """
            UPDATE email_verification_codes
            SET used_at=?, verified_at=?, verification_token_hash=?, token_expires_at=?
            WHERE id=?
            """,
            (now.isoformat(), now.isoformat(), token_hash, token_expires_at.isoformat(), row["id"]),
        )
        _mark_latest_event_success(conn, "verify_email_verification", identifier_hash, ip_hash)
        conn.commit()
        return {
            "success": True,
            "email_verified": True,
            "email_verification_token": token,
            "message": "Email verified successfully.",
        }
    finally:
        conn.close()


