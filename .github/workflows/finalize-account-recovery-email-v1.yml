def _email_code_hash(email, nonce, otp):
    return hmac.new(
        SECRET_KEY.encode("utf-8"),
        f"registration-email:{email}:{nonce}:{otp}".encode("utf-8"),
        hashlib.sha256,
    ).hexdigest()


def _email_token_hash(email, token):
    return hmac.new(
        SECRET_KEY.encode("utf-8"),
        f"registration-email-token:{email}:{token}".encode("utf-8"),
        hashlib.sha256,
    ).hexdigest()


def consume_registration_email_verification(email, token, request=None):
    ensure_recovery_schema()
    email = _normalise_email(email)
    token = str(token or "").strip()
    if len(token) < 24:
        raise HTTPException(status_code=400, detail="Verify your email before registration")

    now = _utcnow()
    token_hash = _email_token_hash(email, token)
    conn = get_db()
    try:
        row = conn.execute(
            """
            SELECT id, token_expires_at FROM email_verification_codes
            WHERE email=? AND verification_token_hash=?
              AND verified_at IS NOT NULL AND consumed_at IS NULL
            ORDER BY id DESC LIMIT 1
            """,
            (email, token_hash),
        ).fetchone()
        if not row or not row["token_expires_at"] or datetime.fromisoformat(row["token_expires_at"]) < now:
            raise HTTPException(status_code=400, detail="Email verification expired. Verify the email again.")

        ip_hash = None
        if request is not None:
            ip_hash = _scope_hash(f"consume-email:{_request_ip(request)}")
        conn.execute(
            "UPDATE email_verification_codes SET consumed_at=?, consumed_ip_hash=? WHERE id=?",
            (now.isoformat(), ip_hash, row["id"]),
        )
        conn.commit()
    finally:
        conn.close()


