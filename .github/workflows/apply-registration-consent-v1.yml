name: Apply Registration Consent V1

on:
  push:
    branches:
      - agent/registration-risk-consent-v1
    paths:
      - ".github/workflows/apply-registration-consent-v1.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-risk-consent-v1
          fetch-depth: 0

      - name: Apply backend consent patch
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/apply_consent_patch.py
          python /tmp/apply_consent_patch.py

      - name: Validate backend
        run: |
          python -m py_compile database.py auth/routes.py
          python - <<'PY'
          import ast
          for path in ("database.py", "auth/routes.py"):
              ast.parse(open(path, encoding="utf-8").read())
          print("backend consent patch syntax OK")
          PY

      - name: Commit generated patch
        shell: bash
        run: |
          rm -f .github/workflows/apply-registration-consent-v1.yml
          git config user.name "okai-consent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add database.py auth/routes.py .github/workflows/apply-registration-consent-v1.yml
          git commit -m "Add registration risk acknowledgement audit"
          git push origin HEAD:agent/registration-risk-consent-v1
