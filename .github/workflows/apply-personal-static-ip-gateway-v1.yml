name: Validate Personal Static IP Gateway V1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/personal-static-ip-gateway-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r local_gateway_agent/requirements.txt

      - name: Apply integration patch when needed
        run: |
          if grep -q 'local_gateway_router' main.py; then
            echo 'Static IP gateway patch already applied'
          else
            python scripts/patch_personal_static_ip_gateway_v1.py
          fi

      - name: Compile backend and Termux agent
        run: |
          python -m py_compile \
            main.py strategy/routes.py bot/angel_fetcher.py \
            local_gateway/service.py local_gateway/routes.py \
            local_gateway_agent/okai_local_gateway.py
          bash -n local_gateway_agent/install_termux.sh

      - name: Validate secure queue, lease and result flow
        env:
          DB_PATH: /tmp/okai-static-ip-gateway-test.db
          LOCAL_GATEWAY_ADMIN_ONLY: "true"
        run: |
          rm -f /tmp/okai-static-ip-gateway-test.db
          python - <<'PY'
          from datetime import datetime, timezone
          from database import init_db, get_db
          from auth.utils import hash_password
          from local_gateway.service import (
              authenticate_gateway,
              complete_command,
              ensure_local_gateway_schema,
              get_gateway_status,
              heartbeat_gateway,
              lease_commands,
              pair_gateway,
              queue_live_entry,
              record_position_event,
              set_gateway_armed,
          )

          init_db(); ensure_local_gateway_schema()
          conn = get_db()
          conn.execute(
              "INSERT INTO users(name,email,password_hash,is_admin,subscription_status) VALUES (?,?,?,?,?)",
              ("Ayush", "owner@example.com", hash_password("secret1"), 1, "active"),
          )
          uid = conn.execute("SELECT id FROM users WHERE email='owner@example.com'").fetchone()["id"]
          conn.commit(); conn.close()

          token = pair_gateway(uid, "Test Server Phone", "203.0.113.10")
          gateway = authenticate_gateway(token)
          heartbeat_gateway(gateway, "203.0.113.10", "test-agent")
          set_gateway_armed(uid, True)
          status = get_gateway_status(uid)
          assert status["paired"] is True
          assert status["online"] is True
          assert status["server_armed"] is True
          assert status["observed_ip"] == "203.0.113.10"

          payload = {
              "underlying": "NIFTY",
              "option_type": "CE",
              "symbol": "NIFTY28JUL2625000CE",
              "symboltoken": "12345",
              "exchange": "NFO",
              "quantity": 65,
              "sl_price": 88,
              "target_price": 124,
              "candle_id": "2026-07-21T10:00:00+05:30",
              "different_index_required": True,
          }
          queued = queue_live_entry(uid, payload, "test-entry-1", 2, 5)
          assert queued["queued"] is True
          duplicate = queue_live_entry(uid, payload, "test-entry-1", 2, 5)
          assert duplicate["reason"] == "DUPLICATE_CANDLE_BLOCKED"

          commands = lease_commands(gateway, 5)
          assert len(commands) == 1
          command = commands[0]
          assert command["action"] == "PLACE_ENTRY"
          result = {
              "broker_order_id": "ANGEL123",
              "entry_price": 100,
              "sl_price": 88,
              "target_price": 124,
              "entry_time": datetime.now(timezone.utc).isoformat(),
          }
          complete_command(gateway, command["id"], command["lease_token"], True, result)
          record_position_event(gateway, {
              "event": "EXIT_FILLED",
              "trade_id": queued["trade_id"],
              "exit_price": 124,
              "pnl": 1560,
              "reason": "LOCAL 1-SECOND TARGET HIT",
          })
          conn = get_db()
          trade = conn.execute("SELECT * FROM trades WHERE id=?", (queued["trade_id"],)).fetchone()
          command_row = conn.execute("SELECT * FROM local_order_commands WHERE id=?", (command["id"],)).fetchone()
          conn.close()
          assert trade["status"] == "closed"
          assert trade["broker_order_id"] == "ANGEL123"
          assert trade["pnl"] == 1560
          assert command_row["status"] == "succeeded"
          print("Static IP gateway queue validation OK")
          PY

      - name: Validate no broker secrets are committed
        run: |
          ! grep -RIn --exclude='*.yml' --exclude='*.md' \
            -E '(^|[^A-Z_])(api_key|client_id|totp_secret)[[:space:]]*=[[:space:]]*["'"'][A-Za-z0-9]{8,}' \
            local_gateway local_gateway_agent

      - name: Commit production integration
        run: |
          rm -f scripts/patch_personal_static_ip_gateway_v1.py
          rm -f .github/workflows/apply-personal-static-ip-gateway-v1.yml
          git config user.name "okai-static-ip-gateway-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add personal static IP local order gateway"
          git push origin HEAD:agent/personal-static-ip-gateway-v1
