name: Verify Angel History Deployment

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-angel-history-deploy.yml"
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Railway release
        shell: bash
        run: |
          set -euo pipefail
          URL="https://option-king-saas-production.up.railway.app/health"
          for attempt in $(seq 1 30); do
            echo "Attempt $attempt"
            body=$(curl --fail --silent --show-error --max-time 20 "$URL" || true)
            echo "$body"
            if echo "$body" | grep -q 'angel-history-rate-fix-v2'; then
              echo "Railway Angel history fix is live"
              exit 0
            fi
            sleep 15
          done
          echo "Railway did not expose the expected release marker"
          exit 1
