name: Strengthen Registration Consent V1

on:
  push:
    branches:
      - agent/registration-risk-consent-v1
    paths:
      - ".github/workflows/strengthen-registration-consent-v1.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-risk-consent-v1
          fetch-depth: 0

      - name: Add separate no-guarantee and technology-risk audit fields
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise RuntimeError(f"{label} marker missing")
              return text.replace(old, new, 1)

          db_path = Path("database.py")
          db = db_path.read_text(encoding="utf-8")
          db = replace_once(
              db,
              "            risk_acknowledged INTEGER NOT NULL DEFAULT 0,\n            terms_accepted INTEGER NOT NULL DEFAULT 0,\n",
              "            risk_acknowledged INTEGER NOT NULL DEFAULT 0,\n            no_guarantee_acknowledged INTEGER NOT NULL DEFAULT 0,\n            technology_risk_acknowledged INTEGER NOT NULL DEFAULT 0,\n            terms_accepted INTEGER NOT NULL DEFAULT 0,\n",
              "database consent columns",
          )
          db_path.write_text(db, encoding="utf-8")

          auth_path = Path("auth/routes.py")
          auth = auth_path.read_text(encoding="utf-8")
          auth = replace_once(
              auth,
              "    risk_acknowledged: bool\n    terms_accepted: bool\n",
              "    risk_acknowledged: bool\n    no_guarantee_acknowledged: bool\n    technology_risk_acknowledged: bool\n    terms_accepted: bool\n",
              "request model",
          )
          auth = replace_once(
              auth,
              '        "risk and no-guarantee acknowledgement": req.risk_acknowledged,\n        "Terms of Use": req.terms_accepted,\n',
              '        "trading-risk acknowledgement": req.risk_acknowledged,\n        "no-profit-guarantee acknowledgement": req.no_guarantee_acknowledged,\n        "technology and broker-API risk acknowledgement": req.technology_risk_acknowledged,\n        "Terms of Use": req.terms_accepted,\n',
              "required acceptances",
          )
          auth = replace_once(
              auth,
              "            risk_acknowledged,\n            terms_accepted,\n",
              "            risk_acknowledged,\n            no_guarantee_acknowledged,\n            technology_risk_acknowledged,\n            terms_accepted,\n",
              "insert columns",
          )
          auth = replace_once(
              auth,
              "        VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\n",
              "        VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\n",
              "insert placeholders",
          )
          auth = replace_once(
              auth,
              "            int(req.risk_acknowledged),\n            int(req.terms_accepted),\n",
              "            int(req.risk_acknowledged),\n            int(req.no_guarantee_acknowledged),\n            int(req.technology_risk_acknowledged),\n            int(req.terms_accepted),\n",
              "insert values",
          )
          auth_path.write_text(auth, encoding="utf-8")
          PY

      - name: Validate backend
        run: |
          python -m py_compile database.py auth/routes.py
          grep -q 'no_guarantee_acknowledged' database.py
          grep -q 'technology_risk_acknowledged' auth/routes.py

      - name: Remove workflow and push
        shell: bash
        run: |
          rm -f .github/workflows/strengthen-registration-consent-v1.yml
          git config user.name "okai-consent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Store separate no-guarantee and technology-risk consent"
          git push origin HEAD:agent/registration-risk-consent-v1
