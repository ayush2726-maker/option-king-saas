name: Validate Multi Broker History V1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/multi-broker-history-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply route patch when needed
        run: |
          if grep -q 'get_historical_rows' bot/routes.py; then
            echo 'Route patch already applied'
          else
            python scripts/patch_multi_broker_history_v1.py
          fi

      - name: Compile and validate rate-limit handling
        run: |
          python -m py_compile \
            bot/routes.py \
            bot/history_provider.py \
            bot/brokers/angelone.py \
            bot/brokers/upstox.py \
            bot/brokers/zerodha.py

          python - <<'PY'
          from bot.history_provider import (
              _cache_ttl,
              _friendly_error,
              _is_rate_limit_error,
              _normalise_rows,
          )

          raw = "Couldn't parse the JSON response received from the server: b'Access denied because of exceeding access rate'"
          assert _is_rate_limit_error(raw)
          message = _friendly_error("angelone", raw)
          assert "45 seconds" in message
          assert "JSON" not in message
          assert _cache_ttl(1) == 75
          assert _cache_ttl(7) == 600
          rows = _normalise_rows([
              ["2026-07-21T09:15:00+05:30", 100, 101, 99, 100.5, 10],
              {"date": "2026-07-21T09:30:00+05:30", "open": 101, "high": 102, "low": 100, "close": 101.5, "volume": 20},
          ])
          assert len(rows) == 2
          assert rows[0][0].startswith("2026-07-21T09:15")
          print("Rate-limit and candle normalisation validation OK")
          PY

          grep -q 'get_historical_rows' bot/routes.py
          grep -q 'history_cached' bot/routes.py
          grep -q '45 seconds baad pull-down refresh' bot/routes.py
          if grep -q 'HISTORY_FETCH_FAILED:' bot/routes.py; then
            echo 'Raw SDK history error still exposed'
            exit 1
          fi

      - name: Commit production fix
        run: |
          rm -f scripts/patch_multi_broker_history_v1.py
          rm -f .github/workflows/validate-multi-broker-history-v1.yml
          git config user.name "okai-history-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix Angel rate limits and support multi broker history"
          git push origin HEAD:agent/multi-broker-history-v1
