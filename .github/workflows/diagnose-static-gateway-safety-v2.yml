name: Diagnose Static Gateway Safety V2

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/personal-static-ip-gateway-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run patch and save error
        shell: bash
        run: |
          set +e
          python scripts/patch_static_gateway_safety_v2.py > /tmp/safety-v2.log 2>&1
          status=$?
          set -e
          cat /tmp/safety-v2.log
          if [ "$status" -ne 0 ]; then
            mkdir -p diagnostics
            cp /tmp/safety-v2.log diagnostics/static-gateway-safety-v2-error.txt
            git config user.name "okai-static-ip-gateway-bot"
            git config user.email "actions@users.noreply.github.com"
            git add diagnostics/static-gateway-safety-v2-error.txt
            git commit -m "Save static gateway safety diagnostic" || true
            git push origin HEAD:agent/personal-static-ip-gateway-v1 || true
            exit "$status"
          fi
