name: Configure Railway Email OTP

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/configure-email-otp.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-email-otp-config
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          missing=0
          for name in RAILWAY_TOKEN RESEND_API_KEY EMAIL_FROM; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub Actions secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install --global @railway/cli@latest

      - name: Confirm Railway access
        run: railway status --json

      - name: Set email variables
        shell: bash
        run: |
          args=(variables set "RESEND_API_KEY=$RESEND_API_KEY" "EMAIL_FROM=$EMAIL_FROM")
          if [ -n "$RAILWAY_SERVICE" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi
          railway "${args[@]}"

      - name: Redeploy service
        shell: bash
        run: |
          args=(redeploy --yes)
          if [ -n "$RAILWAY_SERVICE" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi
          railway "${args[@]}"
