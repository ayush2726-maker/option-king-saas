name: Validate Multi-User Local Gateway

on:
  pull_request:
    paths:
      - "local_gateway/**"
      - "local_gateway_agent/**"
      - "main.py"
      - ".github/workflows/validate-multi-user-local-gateway.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DB_PATH: /tmp/okai_multi_user_gateway_ci.db
      LOCAL_GATEWAY_MULTI_USER_ENABLED: "true"
      LOCAL_GATEWAY_ADMIN_ONLY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile gateway code
        run: |
          python -m py_compile \
            local_gateway/service.py \
            local_gateway/routes.py \
            local_gateway/multi_user_patch.py \
            local_gateway_agent/okai_local_gateway.py \
            local_gateway_agent/okai_local_gateway_v2.py \
            main.py

      - name: Validate access, isolation and safe expiry behaviour
        run: |
          rm -f "$DB_PATH"
          python - <<'PY'
          from datetime import datetime, timedelta, timezone

          import database
          database.init_db()

          from database import get_db
          from local_gateway import service
          from local_gateway.multi_user_patch import (
              apply_multi_user_gateway_patch,
              gateway_access,
          )

          apply_multi_user_gateway_patch()
          service.ensure_local_gateway_schema()

          now = datetime.now(timezone.utc)
          conn = get_db()
          try:
              users = [
                  ("Active", "active@example.com", "x", 1, 0, None, "active"),
                  ("Trial", "trial@example.com", "x", 1, 0, (now + timedelta(days=3)).isoformat(), "trial"),
                  ("Expired", "expired@example.com", "x", 1, 0, (now - timedelta(days=1)).isoformat(), "trial"),
                  ("No Consent", "noconsent@example.com", "x", 1, 0, None, "active"),
              ]
              ids = {}
              for name, email, password, active, admin, trial_end, status in users:
                  cur = conn.execute(
                      """
                      INSERT INTO users(name,email,password_hash,is_active,is_admin,trial_ends_at,subscription_status)
                      VALUES (?,?,?,?,?,?,?)
                      """,
                      (name, email, password, active, admin, trial_end, status),
                  )
                  ids[email] = cur.lastrowid

              for email in ("active@example.com", "trial@example.com", "expired@example.com"):
                  conn.execute(
                      """
                      INSERT INTO user_consents(
                          user_id, policy_version, policy_hash, accepted_text,
                          age_confirmed, risk_acknowledged, no_guarantee_acknowledged,
                          technology_risk_acknowledged, terms_accepted, privacy_accepted,
                          algo_order_authorized, whatsapp_trade_alert_opt_in,
                          accepted_at, ip_address, user_agent
                      ) VALUES (?, 'test-v1', 'hash', '{}', 1,1,1,1,1,1,1,1, ?, '127.0.0.1', 'CI')
                      """,
                      (ids[email], now.isoformat()),
                  )
              conn.commit()
          finally:
              conn.close()

          assert gateway_access(ids["active@example.com"])["allowed"] is True
          assert gateway_access(ids["trial@example.com"])["allowed"] is True
          assert gateway_access(ids["expired@example.com"])["reason"] == "SUBSCRIPTION_REQUIRED"
          assert gateway_access(ids["noconsent@example.com"])["reason"] == "ALGO_ORDER_CONSENT_REQUIRED"

          token_a = service.pair_gateway(ids["active@example.com"], "Phone A", "203.0.113.10")
          token_b = service.pair_gateway(ids["trial@example.com"], "Desktop B", "203.0.113.11")
          gateway_a = service.authenticate_gateway(token_a)
          gateway_b = service.authenticate_gateway(token_b)
          assert gateway_a["user_id"] == ids["active@example.com"]
          assert gateway_b["user_id"] == ids["trial@example.com"]
          assert gateway_a["id"] != gateway_b["id"]

          service.set_gateway_armed(ids["active@example.com"], True)
          assert service.get_gateway_status(ids["active@example.com"])["server_armed"] is True
          replacement = service.pair_gateway(ids["active@example.com"], "Replacement", "203.0.113.12")
          assert replacement != token_a
          assert service.get_gateway_status(ids["active@example.com"])["server_armed"] is False

          # Token authentication stays available for exits/heartbeat after expiry,
          # while arming and new entries are blocked by the access policy.
          conn = get_db()
          try:
              conn.execute(
                  "UPDATE users SET subscription_status='expired', trial_ends_at=NULL WHERE id=?",
                  (ids["trial@example.com"],),
              )
              conn.commit()
          finally:
              conn.close()
          assert service.authenticate_gateway(token_b)["user_id"] == ids["trial@example.com"]
          try:
              service.set_gateway_armed(ids["trial@example.com"], True)
              raise AssertionError("Expired user was incorrectly armed")
          except Exception as exc:
              assert "subscription" in str(exc).lower()

          print("MULTI_USER_LOCAL_GATEWAY_VALIDATION_OK")
          PY

      - name: Import complete FastAPI application
        run: |
          python - <<'PY'
          import main
          paths = {route.path for route in main.app.routes}
          assert "/local-gateway/access" in paths
          assert "/local-gateway/status" in paths
          assert "/local-gateway/pair" in paths
          print("FASTAPI_MULTI_USER_GATEWAY_IMPORT_OK")
          PY
