name: Validate AUTO Only SENSEX Fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-auto-only-sensex-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply fix and capture diagnostic
        shell: bash
        run: |
          if grep -q 'VOLUME_UNAVAILABLE_NEUTRAL' bot/strategy.py; then
            echo 'AUTO volume-neutral fix already applied'
            exit 0
          fi
          set +e
          python scripts/patch_auto_only_sensex_v1.py > /tmp/auto-fix.log 2>&1
          status=$?
          set -e
          cat /tmp/auto-fix.log
          if [ "$status" -ne 0 ]; then
            mkdir -p diagnostics
            cp /tmp/auto-fix.log diagnostics/auto-only-sensex-fix-error.txt
            git config user.name "okai-auto-index-fix-bot"
            git config user.email "actions@users.noreply.github.com"
            git add diagnostics/auto-only-sensex-fix-error.txt
            git commit -m "Save AUTO SENSEX fix diagnostic" || true
            git push origin HEAD:agent/fix-auto-only-sensex-v1 || true
            exit "$status"
          fi

      - name: Compile backend
        run: python -m py_compile bot/angel_fetcher.py bot/strategy.py backtest/routes.py

      - name: Validate zero-volume NSE index scoring
        run: |
          python - <<'PY'
          import pandas as pd
          from bot.angel_fetcher import calculate_indicators
          from bot.strategy import get_full_signal, VOLUME_NEUTRAL_BONUS

          rows = []
          for i in range(40):
              close = 22000 + i * 8
              rows.append({
                  "time": f"2026-07-20T{9 + (15 + i * 5)//60:02d}:{(15 + i * 5)%60:02d}:00+05:30",
                  "open": close - 4,
                  "high": close + 7,
                  "low": close - 7,
                  "close": close,
                  "volume": 0,
              })
          calculated, _ = calculate_indicators(pd.DataFrame(rows))
          assert calculated["VOLUME_AVAILABLE"].eq(False).all()
          assert calculated["VOL_RATIO"].eq(1.0).all()

          market = {
              "price": 22150, "vwap": 22145, "ema9": 22148, "ema21": 22140,
              "adx": 30, "volume_ratio": 1.0, "volume_available": False,
              "vwap_fallback_used": True, "supertrend_dir": "UP",
              "trend": "UPTREND", "mtf_confirmed": True,
              "c1_bullish": True, "c2_bullish": True, "gap_day": False,
              "orb_high": 22140, "orb_low": 22000, "atr": 10,
          }
          signal = get_full_signal(market)
          assert signal["volume_available"] is False
          assert signal["volume_bonus"] == VOLUME_NEUTRAL_BONUS
          assert "VOLUME_UNAVAILABLE_NEUTRAL" in signal["warnings"]
          assert signal["score"] >= 82 and signal["trade_allowed"] is True, signal
          blocked = get_full_signal({**market, "volume_available": True, "volume_ratio": 0.0})
          assert blocked["score"] == signal["score"] - VOLUME_NEUTRAL_BONUS
          print("Zero-volume NSE index scoring validation OK")
          PY

      - name: Validate AUTO merge diagnostics
        run: |
          python - <<'PY'
          import backtest.routes as routes
          original = routes._OKAI_ORIGINAL_SINGLE_INDEX_BACKTEST

          def fake_single(broker, obj, instrument, date_str, capital, *args):
              schedule = {
                  "NIFTY": ("2026-07-20T10:00:00+05:30", "2026-07-20T10:30:00+05:30", 84),
                  "BANKNIFTY": ("2026-07-20T10:05:00+05:30", "2026-07-20T10:20:00+05:30", 90),
                  "SENSEX": ("2026-07-20T10:35:00+05:30", "2026-07-20T10:45:00+05:30", 84),
              }
              entry, exit_, score = schedule[instrument]
              return {
                  "success": True, "instrument": instrument, "total_trades": 1,
                  "total_pnl": 10, "debug_max_score": score,
                  "debug_candle_count": 75,
                  "debug_volume_available": instrument == "SENSEX",
                  "debug_volume_neutral_count": 40 if instrument != "SENSEX" else 0,
                  "trades": [{"instrument": instrument, "entry_time": entry,
                              "exit_time": exit_, "entry_price": 100,
                              "exit_price": 110, "score": score, "side": "CE"}],
                  "debug_top_candidates": [], "summary": {},
              }

          try:
              routes._OKAI_ORIGINAL_SINGLE_INDEX_BACKTEST = fake_single
              result = routes._okai_run_auto_index_backtest(
                  "angelone", object(), "2026-07-20", 100000, 82, 0, 0
              )
          finally:
              routes._OKAI_ORIGINAL_SINGLE_INDEX_BACKTEST = original

          assert [t["instrument"] for t in result["trades"]] == ["NIFTY", "SENSEX"]
          per = result["per_instrument"]
          assert per["NIFTY"]["selected_trades"] == 1
          assert per["BANKNIFTY"]["selected_trades"] == 0
          assert per["SENSEX"]["selected_trades"] == 1
          assert per["NIFTY"]["volume_available"] is False
          print("AUTO merge diagnostics validation OK")
          PY

      - name: Commit validated fix
        run: |
          rm -f scripts/patch_auto_only_sensex_v1.py
          rm -f .github/workflows/validate-auto-only-sensex-fix.yml
          rm -f diagnostics/auto-only-sensex-fix-error.txt
          rmdir diagnostics 2>/dev/null || true
          git config user.name "okai-auto-index-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix AUTO backtest bias toward SENSEX"
          git push origin HEAD:agent/fix-auto-only-sensex-v1
